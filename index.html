<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wyvern | OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bat-black: #050505;
            --bat-gray: #121213;
            --bat-silver: #cbd5e1;
            --bat-accent: #2d3748;
            --bat-highlight: #ffffff;
            --bat-success: #00ff88;
        }

        body { 
            font-family: 'Roboto Condensed', sans-serif; 
            background-color: var(--bat-black); 
            color: var(--bat-silver);
            margin: 0; padding: 10px;
        }

        .container { 
            background: var(--bat-gray); 
            padding: 20px; 
            border-radius: 4px; 
            border: 1px solid var(--bat-accent);
            width: 100%; max-width: 850px; margin: auto; box-sizing: border-box;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid var(--bat-accent); padding-bottom: 15px; }
        h2 { margin: 0; color: var(--bat-highlight); font-family: 'Orbitron', sans-serif; font-size: 2.2rem; text-transform: uppercase; letter-spacing: 12px; }

        /* --- CONTROL CENTER (RATE + CALCULATOR) --- */
        .control-center {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--bat-accent);
            padding: 20px;
            margin-bottom: 20px;
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        @media (min-width: 600px) { .input-grid { grid-template-columns: 1fr 1fr; } }

        label { font-weight: 700; font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; display: block; }
        
        input { 
            width: 100%; padding: 14px; 
            border: 1px solid var(--bat-accent); 
            background: #000;
            color: #fff;
            font-size: 16px; box-sizing: border-box; outline: none;
            font-family: 'Orbitron', sans-serif;
            border-radius: 2px;
        }

        .scan-btn {
            width: 100%;
            padding: 15px;
            background: transparent;
            color: var(--bat-highlight);
            border: 1px solid var(--bat-highlight);
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .scan-btn:active { background: var(--bat-highlight); color: #000; }

        /* --- CALC RESULT OVERLAY --- */
        .calc-display {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: rgba(0, 255, 136, 0.05);
            padding: 15px;
            border: 1px solid var(--bat-success);
            margin-top: 15px;
            text-align: center;
        }

        .res-label { font-size: 0.6rem; color: #64748b; text-transform: uppercase; margin-bottom: 5px; }
        .res-val { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: var(--bat-success); }

        /* --- GRID SYSTEM --- */
        .wyvern-grid { border: 1px solid var(--bat-accent); background: #000; margin-top: 10px; }
        .grid-header {
            display: grid;
            grid-template-columns: 1.8fr 0.8fr 1fr 1.4fr;
            background: #000;
            border-bottom: 2px solid var(--bat-accent);
            padding: 12px;
            font-weight: 700;
            font-size: 0.75rem;
            color: var(--bat-highlight);
        }

        .grid-row {
            display: grid;
            grid-template-columns: 1.8fr 0.8fr 1fr 1.4fr;
            padding: 15px 12px;
            border-bottom: 1px solid var(--bat-accent);
            align-items: center;
        }

        .grid-row.is-base { background: rgba(255,255,255,0.03); }
        .pkg-id { font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--bat-highlight); font-size: 1.1rem; }
        .price-tag { color: var(--bat-success); font-weight: 700; font-size: 1.1rem; text-align: right; display: flex; align-items: center; justify-content: flex-end; }
        
        .copy-btn {
            background: transparent; color: var(--bat-highlight); border: 1px solid var(--bat-highlight);
            padding: 5px 10px; font-size: 0.6rem; cursor: pointer;
            font-family: 'Orbitron', sans-serif; margin-left: 10px;
        }

        .logic-tag { font-size: 0.65rem; color: #64748b; display: block; text-transform: uppercase; margin-top: 4px; }

        @media (max-width: 500px) {
            .grid-header, .grid-row { grid-template-columns: 1.5fr 0.7fr 0.8fr 1.5fr; font-size: 0.8rem; }
            h2 { font-size: 1.5rem; letter-spacing: 6px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>WYVERN</h2>
    </div>
    
    <div class="control-center">
        <div class="input-grid">
            <div>
                <label>Master Intel: 1000 Coins Rate</label>
                <input type="number" id="coinPrice" placeholder="E.G. 15.50">
            </div>
            <div>
                <label>Custom Coin Amount (Calculator)</label>
                <input type="number" id="manualCoins" placeholder="E.G. 5000">
            </div>
        </div>
        
        <button class="scan-btn" onclick="executeSystem()">Initialize Tactical Scan</button>

        <div class="calc-display" id="calcResult" style="display: none;">
            <div>
                <div class="res-label">Retail Cost</div>
                <div class="res-val" id="resRetail">$--</div>
            </div>
            <div>
                <div class="res-label">Tactical (+5%)</div>
                <div class="res-val" id="resTactical">$--</div>
            </div>
        </div>
    </div>

    <div class="wyvern-grid">
        <div class="grid-header">
            <div>Build</div>
            <div>Units</div>
            <div>Base</div>
            <div style="text-align: right;">Tactical (+5%)</div>
        </div>
        <div id="output">
            </div>
    </div>
</div>

<script>
    const packages = [
        { id: "WP", coins: 76, logic: "Special Protocol", isBase: true },
        { id: "D86", coins: 61.5, logic: "CORE_UNIT", isBase: true },
        { id: "D172", coins: 122, logic: "CORE_UNIT", isBase: true },
        { id: "D257", coins: 176.7, logic: "CORE_UNIT", isBase: true },
        { id: "D343", coins: 244, logic: "2 × D172", isBase: false },
        { id: "D429", coins: 298.7, logic: "D172 + D257", isBase: false },
        { id: "D514", coins: 353.4, logic: "2 × D257", isBase: false },
        { id: "D600", coins: 420.7, logic: "2 × D172 + D257", isBase: false },
        { id: "D706", coins: 480, logic: "CORE_UNIT", isBase: true },
        { id: "D878", coins: 602, logic: "D706 + D172", isBase: false },
        { id: "D963", coins: 656.7, logic: "D706 + D257", isBase: false },
        { id: "D1049", coins: 718.2, logic: "D706 + D172 + D86", isBase: false },
        { id: "D1135", coins: 778.7, logic: "D706 + D172 + D257", isBase: false },
        { id: "D1412", coins: 960, logic: "2 × D706", isBase: false },
        { id: "D2195", coins: 1453, logic: "CORE_UNIT", isBase: true },
        { id: "D3688", coins: 2424, logic: "CORE_UNIT", isBase: true },
        { id: "D4394", coins: 2904, logic: "D3688 + D706", isBase: false },
        { id: "D5532", coins: 3660, logic: "CORE_UNIT", isBase: true },
        { id: "D9288", coins: 6079, logic: "CORE_UNIT", isBase: true }
    ];

    function copyVal(val, btn) {
        navigator.clipboard.writeText(val);
        const originalText = btn.innerText;
        btn.innerText = "COPIED";
        btn.style.background = "#fff"; btn.style.color = "#000";
        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = "transparent"; btn.style.color = "#fff";
        }, 800);
    }

    function executeSystem() {
        const rate = document.getElementById('coinPrice').value;
        const customAmount = document.getElementById('manualCoins').value;
        const outputContainer = document.getElementById('output');
        const calcDisplay = document.getElementById('calcResult');
        
        if (!rate || rate <= 0) return alert("SYSTEM ERROR: ENTER MASTER RATE.");

        const perCoin = rate / 1000;

        // 1. Run Manual Calculator if amount exists
        if (customAmount && customAmount > 0) {
            const retail = (customAmount * perCoin).toFixed(2);
            const tactical = (retail * 1.05).toFixed(2);
            document.getElementById('resRetail').innerText = "$" + retail;
            document.getElementById('resTactical').innerText = "$" + tactical;
            calcDisplay.style.display = 'grid';
        } else {
            calcDisplay.style.display = 'none';
        }

        // 2. Refresh Database Scan
        outputContainer.innerHTML = '';
        packages.forEach(pkg => {
            const retailVal = (pkg.coins * perCoin).toFixed(2);
            const profitVal = (retailVal * 1.05).toFixed(2);
            outputContainer.innerHTML += `
                <div class="grid-row ${pkg.isBase ? 'is-base' : ''}">
                    <div><span class="pkg-id">${pkg.id}</span><span class="logic-tag">${pkg.logic}</span></div>
                    <div>${pkg.coins}</div>
                    <div>$${retailVal}</div>
                    <div class="price-tag">$${profitVal}<button class="copy-btn" onclick="copyVal('${profitVal}', this)">Copy</button></div>
                </div>
            `;
        });
    }
</script>
</body>
</html>
